<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Agent Platform</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ===== BAKGRUND & FONT ===== */
body {
    margin: 0;
    font-family: "Courier New", monospace;
    background-color: #0a0f1c;
    color: #00ffcc;
    overflow-x: hidden;
    position: relative;
}

/* ===== SCROLLANDE TERMINAL ===== */
#terminal-bg {
    position: fixed;
    top: 100;
    left: 20;
    width: 90%;
    height: 90%;
    color: #00ff33;
    font-size: 12px;
    opacity: 0.13; /* svag så den inte stör */
    pointer-events: none;
    overflow: hidden;
    white-space: pre;
    line-height: 1.2;
}

/* ===== HEADER ===== */
header {
    padding: 15px;
    border-bottom: 1px solid #00ffcc;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

header h1 {
    margin: 0;
    font-size: 22px;
    letter-spacing: 2px;
}

input {
    width: 78%;
    padding: 12px;
    background: black;
    border: 1px solid #00ffcc;
    color: #00ffcc;
    text-align: center;
    font-family: "Courier New", monospace;
    font-size: 16px;
}

nav ul {
    list-style: none;
    margin: 0;
    padding: 0;
    display: flex;
    gap: 15px;
}

nav li {
    cursor: pointer;
}

nav li:hover {
    text-decoration: underline;
}

/* ===== MAIN ===== */
main {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 40px 20px;
    text-align: center;
}

main h2 {
    font-size: 20px;
    margin-bottom: 15px;
}

main p {
    font-size: 16px;
}

/* ===== KNAPP ===== */
button {
    margin: 10px 5px;
    padding: 12px 20px;
    background: #00ffcc;
    border: none;
    font-family: "Courier New", monospace;
    font-weight: bold;
    cursor: pointer;
    color: black;
    border-radius: 1px;
    transition: all 0.2s;
}

button:hover {
    background: #00cc99;
}

/* ===== KONTAKT ===== */
#contact {
    margin-top: 40px;
    border-top: 1px solid #00ffcc;
    padding-top: 20px;
    font-size: 14px;
}

#panel {
    margin-top: 25px;
    border-top: 0px dotted #00ffcc;
    padding-top: 15px;
    font-size: 14px;
    text-align: left;
    width: 80%;
    max-width: 350px;
}
</style>
</head>

<body>

<script>
if (sessionStorage.getItem("access") !== "granted") {
    document.body.innerHTML = "> ACCESS BLOCKED";
}
</script>

<!-- SCROLLANDE TERMINAL -->
<div id="terminal-bg"></div>


<main>
    <h2>Area 51 Agent Platform</h2>
    <p></p>
    <p>Welcome Agent Voss</p>
    <p></p>
    
    <div>
        <button onclick="showMission()">MISSIONS</button>
    </div>

    <div>
        <button onclick="showProfile()">PROFILE</button>
    </div>

    <div>
        <button onclick="showDocument()">DOCUMENT</button>
    </div>

    <div>
        <button onclick="showContact()">CONTACT</button>
    </div>

    <div id="panel"></div>
    
</main>

<script>
// ===== TERMINAL-SCROLLING =====
const terminal = document.getElementById("terminal-bg");
const lines = [
    "Initializing ARCHITECT network...",
    "Decrypting mission files...",
    "Connecting to secure server...",
    "Bypassing firewall...",
    "Scanning global coordinates...",
    "Retrieving agent logs...",
    "System check: OK",
    "Access level: CONFIDENTIAL",
    "Monitoring active missions...",
    "Encrypting communication channels...",
    "Loading mission data..."
];

function addLine() {
    const line = lines[Math.floor(Math.random() * lines.length)];
    terminal.innerHTML += line + "\n";
    terminal.scrollTop = terminal.scrollHeight;
}

setInterval(addLine, 200); // ny rad varje 200ms


// ===== SHOW PANEL =====
function showPanel(content) {
    document.getElementById("panel").innerHTML = content;
}

function showMission() {
    showPanel(`
> MISSION PROTOCOL:
<br><br>
No pending missions.
`);
}

function showProfile() {
    showPanel(`
> PROFILE PROTOCOL:
<br><br>
Agent profile is confidential.
`);
}

function showDocument() {
    showPanel(`
> CONFIDENTIAL, CLEARENCE LEVEL 5:
<br><br>
Enter password.
<br>
<input type="password" id="password" placeholder="••••••">
    <button onclick="checkPassword()">ENTER</button>
`);
}

function showContact() {
    showPanel(`
> SECURE LINE:
<br><br>
+46 70 123 45 67
<br><br>
> Report to base for latest information.
`);
}
</script>

</body>
</html>

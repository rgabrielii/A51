<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<title>Secure Access</title>

<style>
/* ===== BAKGRUND ===== */
body {
    background-color: #0a0f1c;
    color: #00ffcc;
    font-family: "Courier New", monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ===== CONTAINER ===== */
.container {
    text-align: center;
    border: 1px solid #00ffcc;
    padding: 40px;
    width: 320px;
    box-shadow: 0 0 20px #00ffcc;
}

/* ===== RUBRIK ===== */
h1 {
    margin-bottom: 20px;
    font-size: 20px;
    letter-spacing: 2px;
}

/* ===== INPUT ===== */
input {
    width: 100%;
    padding: 10px;
    background: black;
    border: 1px solid #00ffcc;
    color: #00ffcc;
    text-align: center;
}

/* ===== KNAPP ===== */
button {
    margin-top: 15px;
    padding: 10px;
    width: 100%;
    background: #00ffcc;
    border: none;
    cursor: pointer;
    font-weight: bold;
}

/* ===== FELMEDDELANDE ===== */
#error {
    color: red;
    margin-top: 10px;
    display: none;
}

/* ===== SCANNING TEXT ===== */
#scanner {
    margin-top: 15px;
    text-align: left;
    font-size: 12px;
    height: 100px;
    overflow: hidden;
    display: none;
}
</style>
</head>

<body>

<div class="container">
    <h1>SECURE ACCESS</h1>

    <p>Enter access code</p>

    <input type="password" id="password" placeholder="••••••">

    <button onclick="startScan()">ENTER</button>

    <p id="error">ACCESS DENIED</p>

    <div id="scanner"></div>
</div>

<script>
// ===== INSTÄLLNINGAR =====
const correctPassword = "ARCHITECT";
const nextPage = "next.html";

// ===== FAKE SCAN TEXT =====
const scanLines = [
    "Initializing secure connection...",
    "Bypassing firewall...",
    "Decrypting credentials...",
    "Scanning user identity...",
    "Accessing global database...",
    "Verifying clearance level...",
    "Finalizing authentication..."
];

// ===== START SCAN =====
function startScan() {
    const input = document.getElementById("password").value;
    const scanner = document.getElementById("scanner");
    const error = document.getElementById("error");

    scanner.innerHTML = "";
    scanner.style.display = "block";
    error.style.display = "none";

    let i = 0;

    const interval = setInterval(() => {
        if (i < scanLines.length) {
            scanner.innerHTML += "> " + scanLines[i] + "<br>";
            scanner.scrollTop = scanner.scrollHeight;
            i++;
        } else {
            clearInterval(interval);

            // Kolla lösenord efter scan
            if (input === correctPassword) {
                scanner.innerHTML += "<br>> ACCESS GRANTED";
                setTimeout(() => {
                    window.location.href = nextPage;
                }, 1000);
            } else {
                scanner.innerHTML += "<br>> ACCESS DENIED";
                error.style.display = "block";
            }
        }
    }, 400); // 👉 ändra hastighet här
}

// ENTER-tangent
document.getElementById("password").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        startScan();
    }
});
</script>

</body>
</html>
